# Render.com Blueprint — EventHub deployment
# https://render.com/docs/blueprint-spec

databases:
  - name: eventhub-db
    plan: free
    databaseName: eventhub
    user: eventhub_user
    postgresMajorVersion: "16"

services:
  # Backend (NestJS API)
  - type: web
    name: eventhub-backend
    runtime: node
    plan: free
    rootDir: backend
    branch: ai-agent
    buildCommand: npm ci && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/health
    postDeployCommand: npx prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DB_HOST
        fromDatabase:
          name: eventhub-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: eventhub-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: eventhub-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: eventhub-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: eventhub-db
          property: database
      - key: DATABASE_URL
        fromDatabase:
          name: eventhub-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://application-frontend-fjji.onrender.com,https://application-backend-54iw.onrender.com,http://localhost:5173,http://localhost:3000"
        sync: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
        sync: true

  # Frontend (React SPA via static site)
  - type: web
    name: eventhub-frontend
    runtime: static
    plan: free
    branch: ai-agent
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://application-backend-54iw.onrender.com/api"
      - key: VITE_SOCKET_URL
        value: "https://application-backend-54iw.onrender.com"
