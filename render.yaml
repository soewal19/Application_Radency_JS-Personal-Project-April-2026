# Render.com Blueprint — EventHub deployment
# https://render.com/docs/blueprint-spec

services:
  # Backend (NestJS API)
  - type: web
    name: application-backend
    runtime: node
    plan: free
    rootDir: backend
    branch: ai-agent
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push && npx ts-node prisma/seed.ts && node dist/src/main
    healthCheckPath: /api/health
    # postDeployCommand: npx prisma migrate deploy  # Disabled - migrations now run in startCommand
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: DATABASE_URL
        value: "file:./prisma/dev.db"
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://application-frontend-fjji.onrender.com,https://application-backend-54iw.onrender.com"
        sync: true
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: "llama-3.3-70b-versatile"
        sync: true

  # Frontend (React SPA via static site)
  - type: web
    name: application-frontend
    runtime: static
    plan: free
    branch: ai-agent
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: "https://application-backend-54iw.onrender.com/api"
      - key: VITE_SOCKET_URL
        value: "https://application-backend-54iw.onrender.com"
